# ================================
# GLOBAL CONFIGURATION
# ================================

# application name
spring.application.name=website-monitoring-api

# timezone configuration for logs and database
spring.jackson.time-zone=America/Sao_Paulo
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo

# path matching strategy (compatibility)
spring.mvc.pathmatch.matching-strategy=ant-path-matcher

# IMPORTANT:
# do not define spring.profiles.active here
# it will be controlled by environment variables (coolify)