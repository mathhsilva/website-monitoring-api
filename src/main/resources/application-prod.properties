# ================================
# PRODUCTION ENVIRONMENT
# ================================

# server port (coolify can override)
server.port=${SERVER_PORT:8080}

# database configuration (postgresql via env variables)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# jpa configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# scheduler configuration (slower to avoid overload)
monitoring.scheduler.fixed-rate=${MONITORING_SCHEDULER_FIXED_RATE:60s}

# http timeout configuration
monitoring.http.timeout.connect=${MONITORING_HTTP_TIMEOUT_CONNECT:3000}
monitoring.http.timeout.read=${MONITORING_HTTP_TIMEOUT_READ:5000}

# logging (less verbose in production)
logging.level.root=INFO
logging.level.com.matheus.websitemonitoring=INFO

# actuator for healthcheck (required for coolify)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never