# ===============================
# SERVER
# ===============================
server.port=${SERVER_PORT:8080}

# ===============================
# DATABASE (POSTGRES)
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===============================
# CONNECTION POOL (Hikari)
# ===============================
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:2}
spring.datasource.hikari.idle-timeout=30000

# ===============================
# MONITORING CONFIG
# ===============================
monitoring.scheduler.fixed-rate=${MONITORING_INTERVAL:60000}
monitoring.http.timeout.connect=${HTTP_TIMEOUT_CONNECT:3000}
monitoring.http.timeout.read=${HTTP_TIMEOUT_READ:5000}

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.matheus.websitemonitoring=INFO
logging.file.name=${LOG_FILE:logs/application.log}